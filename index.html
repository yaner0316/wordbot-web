<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>小龙戏单词</title>
  <link rel="preconnect" href="https://fonts.googleapis.cn" />
  <link rel="preconnect" href="https://fonts.gstatic.cn" crossorigin />
  <link href="https://fonts.googleapis.cn/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>

<div id="app">
  <!-- Loading -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner">
      <div class="ring"></div>
      <div class="text" id="loadingText">加载中...</div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- History Detail Sheet -->
  <div class="hd-backdrop" id="hdBackdrop" onclick="closeHistoryDetail()"></div>
  <div class="hd-sheet" id="hdSheet">
    <div class="hd-header">
      <div class="hd-header-info">
        <div class="hd-date" id="hdDate"></div>
        <div class="hd-score" id="hdScore"></div>
      </div>
      <button class="hd-close" onclick="closeHistoryDetail()">✕</button>
    </div>
    <div class="hd-body" id="hdBody"></div>
  </div>

  <!-- ===== PAGE: LOGIN ===== -->
  <div class="page active" id="pageLogin">
    <div class="auth-shell">
      <div class="auth-hero">
        <div class="auth-logo">📖</div>
        <div>
          <h1>小龙戏单词</h1>
          <p>先登录，再开始今天的单词练习。</p>
        </div>
      </div>

      <div class="auth-card">
        <div class="auth-tabs">
          <button class="auth-tab active" id="loginTab" onclick="setAuthMode('login')">登录</button>
          <button class="auth-tab" id="registerTab" onclick="setAuthMode('register')">注册</button>
        </div>
<div class="auth-form">
          <label id="authUsernameWrap">
            <span id="authIdentifierLabel">用户名</span>
            <input type="text" id="authUsername" autocomplete="username" placeholder="用户名" />
          </label>
<label id="authPasswordWrap">
            <span>密码</span>
            <input type="password" id="authPassword" autocomplete="current-password" placeholder="请输入密码" onkeydown="if(event.key==='Enter')submitAuth()" />
          </label>
          <label id="authConfirmWrap" style="display:none;">
            <span>确认密码</span>
            <input type="password" id="authPasswordConfirm" autocomplete="new-password" placeholder="再输入一次密码" onkeydown="if(event.key==='Enter')submitAuth()" />
          </label>
<button class="btn btn-primary" onclick="submitAuth()" id="authSubmitBtn">登录</button>
        </div>

        <div class="auth-hint" id="authHint">
          账号密码保存在服务端；注册一次后可在任意浏览器登录。
        </div>
      </div>
    </div>
  </div>

  <!-- ===== PAGE: HOME ===== -->
  <div class="page" id="pageHome">
    <div class="header">
      <div class="header-title">
        <div class="logo">📖</div>
        小龙戏单词
      </div>
      <div class="header-actions">
        <button class="header-btn" onclick="logout()" title="退出登录">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 17l5-5-5-5"/><path d="M15 12H3"/><path d="M21 19V5a2 2 0 0 0-2-2h-7"/></svg>
        </button>
        <button class="header-btn" onclick="navigateTo('history')" title="历史记录">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </button>
      </div>
    </div>

    <div class="user-selector" id="userList"></div>
    <div class="user-input-wrap" id="userInputWrap" style="display:none;margin-top:12px;text-align:center;">
      <input type="text" id="userInput" placeholder="输入用户名开始" 
        style="border:2px solid var(--orange);border-radius:25px;padding:10px 20px;font-size:16px;width:200px;text-align:center;outline:none;color:var(--text);"
        onkeydown="if(event.key==='Enter')manualSelectUser()">
      <button onclick="manualSelectUser()" style="margin-top:8px;background:var(--orange);color:white;border:none;border-radius:20px;padding:8px 24px;font-size:14px;cursor:pointer;">确定</button>
    </div>

    <section class="dragon-hero-card" aria-label="小龙陪练">
      <div class="dragon-hero-content">
        <div class="dragon-hero-chips">
          <div class="learning-level-badge" aria-label="当前学习难度">
            <span class="chip-icon" aria-hidden="true">▥</span>
            <span>当前难度</span>
            <strong id="currentLevelText">初中</strong>
          </div>
          <button class="hero-chip hero-chip-parent" type="button" onclick="openParentConsole()" aria-label="打开家长管理">
            <span class="chip-icon" aria-hidden="true">🔒</span>
            <span>家长管理</span>
          </button>
        </div>
        <div class="dragon-hero-title-wrap">
          <h2>今天也和小龙一起学单词</h2>
          <span class="hero-underline" aria-hidden="true"></span>
        </div>
      </div>
      <div class="dragon-scene" aria-hidden="true">
        <span class="hero-cloud hero-cloud-one"></span>
        <span class="hero-cloud hero-cloud-two"></span>
        <span class="hero-spark hero-spark-one">✦</span>
        <span class="hero-spark hero-spark-two">✧</span>
        <img class="home-dragon" src="assets/reward-game/v1/characters/word-dragon/stage-01/happy.svg" data-legacy-src="assets/xiaolong.png" alt="" />
        <span class="hero-ground"></span>
      </div>
    </section>

    <div id="statsContent">
      <!-- Filled by JS -->
    </div>

    <section class="parent-console parent-console-home-shell" id="parentConsoleEntry" aria-label="家长控制台入口">
      <div class="parent-gate-panel" id="parentGatePanel" style="display:none;">
        <div class="parent-panel-head">
          <strong>家长验证</strong>
          <button type="button" onclick="closeParentConsole()" aria-label="关闭">×</button>
        </div>
        <div class="parent-inline-form">
          <input id="parentUsernameInput" type="text" autocomplete="username" placeholder="家长用户名" />
        </div>
        <div class="parent-inline-form">
          <input id="parentPasswordInput" type="password" autocomplete="current-password" placeholder="登录密码" onkeydown="if(event.key==='Enter')verifyParentPassword()" />
          <button class="btn btn-primary btn-small" type="button" onclick="verifyParentPassword()">进入</button>
        </div>
        <div class="parent-help" id="parentGateHint">请输入当前孩子绑定的家长用户名和家长密码。</div>
      </div>
      <div class="parent-tool-grid" id="parentToolGrid" style="display:none;">
        <button class="parent-tool-card" type="button" onclick="openParentTool('queryWord')">
          <span class="parent-tool-icon">⌕</span>
          <span>查询单词</span>
          <small>查看单词状态</small>
        </button>
        <button class="parent-tool-card" type="button" onclick="openParentTool('editWords')">
          <span class="parent-tool-icon">✎</span>
          <span>编辑词库</span>
          <small>分页管理状态</small>
        </button>
        <button class="parent-tool-card" type="button" onclick="openParentTool('learningSettings')">
          <span class="parent-tool-icon">⚙</span>
          <span>学习设置</span>
          <small>难度与缓存</small>
        </button>
        <button class="parent-tool-card" type="button" onclick="navigateTo('history')">
          <span class="parent-tool-icon">▣</span>
          <span>统计看板</span>
          <small>查看历史表现</small>
        </button>
      </div>
      <div class="parent-tool-panel" id="parentToolPanel" style="display:none;"></div>
    </section>


    <div class="actions home-cta-wrap">
      <button class="btn btn-primary home-primary-cta" onclick="startQuiz()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        开始单词挑战吧！
      </button>
    </div>

    <div id="recentStatus" style="margin-top:12px;text-align:center;font-size:13px;color:var(--text-secondary);display:none;">
      上次考核：<span id="lastTestTime"></span>
    </div>
  </div>

  <!-- ===== PAGE: QUIZ ===== -->
  <div class="page" id="pageQuiz">
    <div class="header quiz-header" style="padding-bottom:4px;">
      <div class="quiz-header-row">
        <div class="header-title">
          <div class="logo">📝</div>
          单词考核
        </div>
        <button class="quiz-home-btn" type="button" onclick="navigateTo('home')" aria-label="返回首页">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5.5 9.5V21h13V9.5"/><path d="M9.5 21v-6h5v6"/></svg>
          <span>返回首页</span>
        </button>
      </div>
    </div>

    <div class="quiz-progress">
      <div class="bar-wrap"><div class="bar-fill" id="quizProgressFill" style="width:10%"></div></div>
      <div class="count"><span id="quizProgressText">1</span>/<span id="quizTotalText">10</span></div>
    </div>

    <div id="questionArea">
      <!-- Filled by JS -->
    </div>

    <div class="quiz-nav">
      <button class="btn btn-secondary" id="prevBtn" onclick="prevQuestion()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        上一题
      </button>
      <button class="btn btn-secondary" id="nextBtn" onclick="nextQuestion()">
        下一题
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <button class="btn btn-success" id="submitBtn" onclick="submitQuiz()" style="display:none;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        提交答案
      </button>
    </div>
  </div>

  <!-- ===== PAGE: RESULTS ===== -->
  <div class="page" id="pageResults">
    <div class="back-row" onclick="navigateTo('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      返回首页
    </div>
    <div id="resultContent"><!-- Filled by JS --></div>
  </div>

  <!-- ===== PAGE: HISTORY ===== -->
  <div class="page" id="pageHistory">
    <div class="header" style="padding-bottom:4px;">
      <div class="back-row" style="margin-bottom:0;" onclick="navigateTo('home')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        返回首页
      </div>
      <div class="header-title" style="margin-top:8px;">
        <div class="logo">📊</div>
        考核历史
      </div>
    </div>
    <div id="historyModeSelectorWrap" style="display:flex;gap:8px;margin:0 0 16px;">
      <button class="level-btn level-active history-mode-btn" data-mode="real" onclick="selectHistoryMode(this,'real')" style="flex:1;">正式记录</button>
      <button class="level-btn history-mode-btn" data-mode="test" onclick="selectHistoryMode(this,'test')" style="flex:1;">测试记录</button>
    </div>
    <div id="historyContent"><!-- Filled by JS --></div>
  </div>
</div>

<!-- Confetti container -->
<div class="confetti-container" id="confettiContainer"></div>

<script src="src/quiz-logic.js"></script>
<script src="src/review-flow.js"></script>
<script src="config.js"></script>
<script src="src/app.js"></script>
</body>
</html>
