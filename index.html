<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>单词机器人 - WordBot</title>
  <link rel="preconnect" href="https://fonts.googleapis.cn" />
  <link rel="preconnect" href="https://fonts.gstatic.cn" crossorigin />
  <link href="https://fonts.googleapis.cn/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #FF6B00;
      --orange-light: #FF8C38;
      --orange-dark: #E06000;
      --orange-subtle: #FFF3E8;
      --orange-bg: #FFFAF5;
      --bg: #FFF8F0;
      --card: #FFFFFF;
      --text: #2D2D2D;
      --text-secondary: #8C8C8C;
      --text-muted: #BFBFBF;
      --shadow: 0 2px 12px rgba(255,107,0,0.08);
      --shadow-hover: 0 4px 24px rgba(255,107,0,0.14);
      --radius: 16px;
      --radius-sm: 10px;
      --green: #34C759;
      --red: #FF3B30;
      --blue: #007AFF;
      --progress-bg: #F0F0F0;
    }
    html, body { height: 100%; }
    body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    /* ===== App Shell ===== */
    #app { max-width: 480px; margin: 0 auto; min-height: 100vh; position: relative; overflow-x: hidden; }
    .page { display: none; padding: 20px 16px 100px; animation: fadeIn .3s ease; }
    .page.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(.9); } to { opacity: 1; transform: scale(1); } }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    @keyframes ringFill { from { stroke-dasharray: 0 314; } to { stroke-dasharray: var(--dash) 314; } }
    @keyframes confetti { 0% { transform: translateY(0) rotate(0); opacity: 1; } 100% { transform: translateY(-120px) rotate(720deg); opacity: 0; } }
    /* ===== Header ===== */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px 12px; position: sticky; top: 0; z-index: 10;
      background: var(--bg);
    }
    .header-title {
      font-size: 22px; font-weight: 700; color: var(--text);
      display: flex; align-items: center; gap: 10px;
    }
    .header-title .logo {
      width: 32px; height: 32px; background: linear-gradient(135deg, var(--orange), var(--orange-light));
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: white; font-weight: 800;
    }
    .header-actions { display: flex; gap: 8px; }
    .header-btn {
      width: 36px; height: 36px; border-radius: 50%; border: none;
      background: var(--card); color: var(--text-secondary); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow); transition: all .2s;
    }
    .header-btn:hover { color: var(--orange); box-shadow: var(--shadow-hover); }
    .header-btn svg { width: 20px; height: 20px; }
    /* ===== User Selector ===== */
    .user-selector {
      display: flex; gap: 10px; padding: 0 4px 20px; overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .user-selector::-webkit-scrollbar { display: none; }
    .user-btn {
      flex-shrink: 0; padding: 10px 24px; border-radius: 24px; border: 2px solid transparent;
      background: var(--card); color: var(--text-secondary); font-size: 15px; font-weight: 500;
      cursor: pointer; transition: all .3s; box-shadow: var(--shadow);
    }
    .user-btn:hover { border-color: var(--orange-light); color: var(--orange); }
    .user-btn.active {
      background: var(--orange); color: white; border-color: var(--orange);
      box-shadow: 0 4px 16px rgba(255,107,0,0.3);
    }
    .user-btn .avatar {
      display: inline-block; width: 28px; height: 28px; border-radius: 50%;
      background: var(--orange-subtle); color: var(--orange); line-height: 28px;
      text-align: center; font-size: 13px; font-weight: 700; margin-right: 8px; vertical-align: middle;
    }
    .user-btn.active .avatar { background: rgba(255,255,255,0.25); color: white; }
    /* ===== Stats Cards ===== */
    .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px;
    }
    .stat-card {
      background: var(--card); border-radius: var(--radius); padding: 18px 16px;
      box-shadow: var(--shadow); transition: all .3s;
    }
    .stat-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
    .stat-card .label {
      font-size: 12px; color: var(--text-secondary); font-weight: 500;
      display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
    }
    .stat-card .value {
      font-size: 28px; font-weight: 800; line-height: 1.1;
    }
    .stat-card .sub { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
    .stat-card.orange .value { color: var(--orange); }
    .stat-card.green .value { color: var(--green); }
    .stat-card.blue .value { color: var(--blue); }
    .stat-card.purple .value { color: #AF52DE; }
    .stat-card.full { grid-column: 1 / -1; }
    /* ===== Progress Ring ===== */
    .progress-ring-wrap {
      display: flex; align-items: center; gap: 20px; padding: 16px 0;
    }
    .progress-ring {
      position: relative; width: 100px; height: 100px; flex-shrink: 0;
    }
    .progress-ring svg { transform: rotate(-90deg); }
    .progress-ring .bg { fill: none; stroke: var(--progress-bg); stroke-width: 8; }
    .progress-ring .fg {
      fill: none; stroke: var(--orange); stroke-width: 8; stroke-linecap: round;
      stroke-dasharray: 282.7; stroke-dashoffset: 282.7;
      transition: stroke-dashoffset 1.5s ease;
    }
    .progress-ring .center {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .progress-ring .center .pct { font-size: 22px; font-weight: 800; color: var(--orange); }
    .progress-ring .center .pct-label { font-size: 11px; color: var(--text-secondary); }
    .ring-stats { flex: 1; }
    .ring-stat-item { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; }
    .ring-stat-item .dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 8px;
    }
    /* ===== Action Buttons ===== */
    .actions { display: flex; gap: 12px; margin: 20px 0; }
    .btn {
      flex: 1; padding: 16px; border: none; border-radius: var(--radius-sm);
      font-size: 16px; font-weight: 600; cursor: pointer;
      transition: all .3s; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary {
      background: linear-gradient(135deg, var(--orange), var(--orange-dark));
      color: white; box-shadow: 0 4px 20px rgba(255,107,0,0.3);
    }
    .btn-primary:hover { box-shadow: 0 6px 28px rgba(255,107,0,0.4); transform: translateY(-2px); }
    .btn-secondary {
      background: var(--card); color: var(--text); box-shadow: var(--shadow);
    }
    .btn-secondary:hover { box-shadow: var(--shadow-hover); }
    .btn-outline {
      background: transparent; color: var(--orange); border: 2px solid var(--orange);
    }
    .btn-outline:hover { background: var(--orange-subtle); }
    .btn-small { padding: 10px 18px; font-size: 14px; border-radius: 8px; flex: none; }
    .level-selector { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; }
    .level-btn { padding: 6px 14px; border-radius: 20px; border: 2px solid #e0e0e0; background: #fff; color: #888; font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .level-btn:hover { border-color: var(--orange); color: var(--orange); }
    .level-btn.level-active { background: var(--orange); border-color: var(--orange); color: #fff; }
    .btn-success { background: var(--green); color: white; box-shadow: 0 4px 16px rgba(52,199,89,0.3); }
    .btn-success:hover { box-shadow: 0 6px 24px rgba(52,199,89,0.4); }
    /* ===== Quiz Page ===== */
    .quiz-progress {
      display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
    }
    .quiz-progress .bar-wrap {
      flex: 1; height: 6px; background: var(--progress-bg); border-radius: 3px; overflow: hidden;
    }
    .quiz-progress .bar-fill {
      height: 100%; background: linear-gradient(90deg, var(--orange), var(--orange-light));
      border-radius: 3px; transition: width .5s ease;
    }
    .quiz-progress .count { font-size: 14px; font-weight: 600; color: var(--text-secondary); white-space: nowrap; }
    .question-card {
      background: var(--card); border-radius: var(--radius); padding: 24px 20px;
      box-shadow: var(--shadow); margin-bottom: 16px;
    }
    .question-type-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
      margin-bottom: 16px;
    }
    .question-type-badge.type1 { background: #E8F5E9; color: #2E7D32; }
    .question-type-badge.type2 { background: #E3F2FD; color: #1565C0; }
    .question-type-badge.type3 { background: #FFF3E0; color: #E65100; }
    .question-text {
      font-size: 17px; line-height: 1.7; color: var(--text); margin-bottom: 20px;
    }
    .question-text .blank {
      display: inline-block; min-width: 100px; border-bottom: 3px solid var(--orange);
      padding: 0 4px 2px; color: var(--orange); font-weight: 700;
    }
    .options { display: flex; flex-direction: column; gap: 10px; }
    .option-btn {
      display: flex; align-items: center; gap: 14px; padding: 14px 18px;
      border: 2px solid #E8E8E8; border-radius: var(--radius-sm);
      background: transparent; cursor: pointer; transition: all .25s;
      font-size: 16px; color: var(--text); text-align: left; width: 100%;
    }
    .option-btn:hover { border-color: var(--orange-light); background: var(--orange-subtle); }
    .option-btn .letter {
      width: 32px; height: 32px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center; font-weight: 700; font-size: 14px;
      background: #F5F5F5; color: var(--text-secondary); flex-shrink: 0;
      transition: all .25s;
    }
    .option-btn.selected {
      border-color: var(--orange); background: var(--orange-subtle);
    }
    .option-btn.selected .letter { background: var(--orange); color: white; }
    .option-btn.correct {
      border-color: var(--green); background: #E8F5E9;
    }
    .option-btn.correct .letter { background: var(--green); color: white; }
    .option-btn.wrong {
      border-color: var(--red); background: #FFEBEE;
    }
    .option-btn.wrong .letter { background: var(--red); color: white; }
    .option-btn:disabled { cursor: default; opacity: .85; }
    .quiz-nav {
      display: flex; gap: 12px; margin-top: 16px;
    }
    .quiz-nav .btn { flex: 1; }
    /* ===== Results ===== */
    .result-hero {
      text-align: center; padding: 32px 16px;
      background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
      margin-bottom: 20px;
    }
    .result-hero .big-score {
      font-size: 56px; font-weight: 800;
    }
    .result-hero .big-score.pass { color: var(--orange); }
    .result-hero .big-score.fail { color: var(--red); }
    .result-hero .sub { font-size: 16px; color: var(--text-secondary); margin-top: 8px; }
    .result-hero .mastered-tag {
      display: inline-block; margin-top: 10px; padding: 4px 16px;
      border-radius: 20px; font-size: 13px; font-weight: 500;
    }
    .result-detail-item {
      background: var(--card); border-radius: var(--radius-sm); padding: 14px 16px;
      box-shadow: var(--shadow); margin-bottom: 8px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .result-detail-item .q-info { flex: 1; }
    .result-detail-item .q-word { font-weight: 600; font-size: 15px; }
    .result-detail-item .q-type { font-size: 12px; color: var(--text-secondary); }
    .result-detail-item .q-status {
      width: 28px; height: 28px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center; font-size: 14px; font-weight: 700;
      flex-shrink: 0;
    }
    .result-detail-item .q-status.correct { background: #E8F5E9; color: var(--green); }
    .result-detail-item .q-status.wrong { background: #FFEBEE; color: var(--red); }
    .result-analysis-card {
      background: var(--card); border-radius: var(--radius-sm); padding: 16px;
      box-shadow: var(--shadow); margin-bottom: 10px; border-left: 4px solid transparent;
    }
    .result-analysis-card.correct { border-left-color: var(--green); }
    .result-analysis-card.wrong { border-left-color: var(--red); }
    .result-analysis-card .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .result-analysis-card .word { font-weight: 700; font-size: 18px; }
    .result-analysis-card .status-badge {
      font-size: 12px; font-weight: 600; padding: 3px 12px; border-radius: 12px;
    }
    .result-analysis-card .status-badge.correct { background: #E8F5E9; color: var(--green); }
    .result-analysis-card .status-badge.wrong { background: #FFEBEE; color: var(--red); }
    .result-analysis-card .ctx-line {
      font-size: 14px; color: var(--text-secondary); line-height: 1.6;
      padding: 8px 10px; background: var(--orange-subtle); border-radius: 8px; margin: 8px 0;
    }
    .result-analysis-card .ctx-line .highlight { color: var(--orange); font-weight: 700; }
    .result-analysis-card .detail-line { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
    .result-analysis-card .detail-line strong { color: var(--text); }

    /* 新分析卡片样式 */
    .result-analysis-card .ctx-box {
      background: var(--orange-subtle);
      border-radius: 8px; padding: 10px 12px; margin: 8px 0;
      font-size: 14px; line-height: 1.7;
    }
    .result-analysis-card .ctx-label { font-weight: 600; color: var(--text); font-size: 12px; margin-bottom: 4px; }
    .result-analysis-card .ctx-text { color: var(--text-secondary); }
    .result-analysis-card .inline-blank {
      display: inline-block; min-width: 80px; border-bottom: 2px dashed var(--orange);
      text-align: center; color: var(--orange); font-weight: 700;
    }
    .result-analysis-card .opts-box {
      margin: 6px 0;
    }
    .result-analysis-card .opts-label { font-weight: 600; color: var(--text); font-size: 12px; margin-bottom: 4px; }
    .result-analysis-card .opt-item {
      font-size: 14px; padding: 5px 10px; margin: 2px 0; border-radius: 6px;
      display: flex; align-items: center; gap: 6px;
    }
    .result-analysis-card .opt-correct { background: #E8F5E9; color: #2E7D32; font-weight: 600; }
    .result-analysis-card .opt-wrong { background: #FFEBEE; color: #C62828; }
    .result-analysis-card .opt-tag {
      font-size: 11px; padding: 1px 8px; border-radius: 10px; font-weight: 600; margin-left: auto;
    }
    .result-analysis-card .opt-tag.tag-correct { background: #C8E6C9; color: #1B5E20; }
    .result-analysis-card .opt-tag.tag-wrong { background: #FFCDD2; color: #B71C1C; }
    .result-analysis-card .explain-box {
      margin-top: 6px; padding: 8px 10px; background: #FFF8E1; border-radius: 8px;
    }
    .result-analysis-card .explain-label { font-weight: 600; color: #F57F17; font-size: 12px; margin-bottom: 4px; }
    .result-analysis-card .detail-line { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
    .history-list { display: flex; flex-direction: column; gap: 10px; }
    .history-item {
      background: var(--card); border-radius: var(--radius-sm); padding: 16px 18px;
      box-shadow: var(--shadow); cursor: pointer; transition: all .3s;
    }
    .history-item:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
    .history-item .top {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;
    }
    .history-item .date { font-size: 13px; color: var(--text-secondary); }
    .history-item .score {
      font-weight: 700; font-size: 18px;
    }
    .history-item .score.pass { color: var(--orange); }
    .history-item .score.fail { color: var(--red); }
    .history-item .bottom {
      display: flex; gap: 8px; align-items: center;
    }
    .history-item .bar {
      flex: 1; height: 4px; background: var(--progress-bg); border-radius: 2px; overflow: hidden;
    }
    .history-item .bar .fill {
      height: 100%; border-radius: 2px; transition: width .5s;
    }
    .history-item .bar .fill.pass { background: linear-gradient(90deg, var(--orange), var(--orange-light)); }
    .history-item .bar .fill.fail { background: var(--red); }
    .history-item .accuracy { font-size: 13px; color: var(--text-secondary); }
    .history-empty {
      text-align: center; padding: 48px 16px; color: var(--text-secondary);
    }
    .history-empty svg { width: 64px; height: 64px; color: var(--text-muted); margin-bottom: 16px; }
    .history-empty p { font-size: 15px; }
    /* ===== Loading ===== */
    .loading-overlay {
      position: fixed; inset: 0; background: rgba(255,248,240,0.85);
      display: none; align-items: center; justify-content: center; z-index: 100;
      backdrop-filter: blur(4px);
    }
    .loading-overlay.active { display: flex; }
    .loading-spinner {
      text-align: center;
    }
    .loading-spinner .ring {
      width: 48px; height: 48px; border: 4px solid var(--progress-bg);
      border-top-color: var(--orange); border-radius: 50%;
      animation: spin .8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-spinner .text { font-size: 14px; color: var(--text-secondary); }
    /* ===== Toast ===== */
    .toast {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      padding: 12px 24px; border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 500; z-index: 200;
      opacity: 0; transition: all .3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .toast.error { background: #FFEBEE; color: var(--red); }
    .toast.success { background: #E8F5E9; color: var(--green); }
    .toast.info { background: #E3F2FD; color: var(--blue); }
    /* ===== Confetti ===== */
    .confetti-container {
      position: fixed; inset: 0; pointer-events: none; z-index: 150;
      overflow: hidden;
    }
    .confetti {
      position: absolute; width: 10px; height: 10px; border-radius: 2px;
      animation: confetti 1.5s ease-out forwards;
    }
    /* ===== Back button ===== */
    .back-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 16px;
      cursor: pointer; color: var(--text-secondary); font-size: 14px; font-weight: 500;
      transition: color .2s;
    }
    .back-row:hover { color: var(--orange); }
    .back-row svg { width: 20px; height: 20px; }
    /* ===== Empty State ===== */
    .section-title {
      font-size: 18px; font-weight: 700; margin-bottom: 14px; display: flex;
      align-items: center; justify-content: space-between;
    }
  </style>
</head>
<body>

<div id="app">
  <!-- Loading -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner">
      <div class="ring"></div>
      <div class="text" id="loadingText">加载中...</div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- ===== PAGE: HOME ===== -->
  <div class="page active" id="pageHome">
    <div class="header">
      <div class="header-title">
        <div class="logo">📖</div>
        单词机器人
      </div>
      <div class="header-actions">
        <button class="header-btn" onclick="navigateTo('history')" title="历史记录">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </button>
      </div>
    </div>

    <div class="user-selector" id="userList"></div>
    <div class="user-input-wrap" id="userInputWrap" style="display:none;margin-top:12px;text-align:center;">
      <input type="text" id="userInput" placeholder="输入用户名开始" 
        style="border:2px solid var(--orange);border-radius:25px;padding:10px 20px;font-size:16px;width:200px;text-align:center;outline:none;color:var(--text);"
        onkeydown="if(event.key==='Enter')manualSelectUser()">
      <button onclick="manualSelectUser()" style="margin-top:8px;background:var(--orange);color:white;border:none;border-radius:20px;padding:8px 24px;font-size:14px;cursor:pointer;">确定</button>
    </div>

    <div class="level-selector" style="margin:16px auto;text-align:center;max-width:340px;">
      <div style="font-size:13px;color:var(--text-secondary);margin-bottom:8px;">难度选择</div>
      <div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;">
        <button class="level-btn active" data-level="" onclick="selectLevel(this,'')" style="flex:1;min-width:60px;padding:8px 6px;border:2px solid #e0e0e0;border-radius:20px;background:#fff;font-size:13px;cursor:pointer;color:var(--text);transition:all .2s;">
          全部
        </button>
        <button class="level-btn" data-level="小学" onclick="selectLevel(this,'小学')" style="flex:1;min-width:60px;padding:8px 6px;border:2px solid #e0e0e0;border-radius:20px;background:#fff;font-size:13px;cursor:pointer;color:var(--text);transition:all .2s;">
          小学
        </button>
        <button class="level-btn" data-level="中学" onclick="selectLevel(this,'中学')" style="flex:1;min-width:60px;padding:8px 6px;border:2px solid #e0e0e0;border-radius:20px;background:#fff;font-size:13px;cursor:pointer;color:var(--text);transition:all .2s;">
          中学
        </button>
        <button class="level-btn" data-level="高中" onclick="selectLevel(this,'高中')" style="flex:1;min-width:60px;padding:8px 6px;border:2px solid #e0e0e0;border-radius:20px;background:#fff;font-size:13px;cursor:pointer;color:var(--text);transition:all .2s;">
          高中
        </button>
        <button class="level-btn" data-level="CET4_6_TOEFL" onclick="selectLevel(this,'CET4_6_TOEFL')" style="flex:1;min-width:60px;padding:8px 6px;border:2px solid #e0e0e0;border-radius:20px;background:#fff;font-size:13px;cursor:pointer;color:var(--text);transition:all .2s;">
          CET/TOEFL
        </button>

    </div>

    <div id="statsContent">

    </div>

    <div class="actions">
      <button class="btn btn-primary" onclick="startQuiz()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        开始考核
      </button>
    </div>

    <div id="recentStatus" style="margin-top:12px;text-align:center;font-size:13px;color:var(--text-secondary);display:none;">
      上次考核：<span id="lastTestTime"></span>
    </div>
  </div>

  <!-- ===== PAGE: QUIZ ===== -->
  <div class="page" id="pageQuiz">
    <div class="header" style="padding-bottom:4px;">
      <div class="header-title">
        <div class="logo">📝</div>
        单词考核
      </div>
    </div>

    <div class="quiz-progress">
      <div class="bar-wrap"><div class="bar-fill" id="quizProgressFill" style="width:10%"></div></div>
      <div class="count"><span id="quizProgressText">1</span>/<span id="quizTotalText">10</span></div>
    </div>

    <div id="questionArea">
      <!-- Filled by JS -->
    </div>

    <div class="quiz-nav">
      <button class="btn btn-secondary" id="prevBtn" onclick="prevQuestion()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        上一题
      </button>
      <button class="btn btn-secondary" id="nextBtn" onclick="nextQuestion()">
        下一题
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <button class="btn btn-success" id="submitBtn" onclick="submitQuiz()" style="margin-top:12px;display:none;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      提交答案
    </button>
  </div>

  <!-- ===== PAGE: RESULTS ===== -->
  <div class="page" id="pageResults">
    <div class="back-row" onclick="navigateTo('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      返回首页
    </div>
    <div id="resultContent"><!-- Filled by JS --></div>
  </div>

  <!-- ===== PAGE: HISTORY ===== -->
  <div class="page" id="pageHistory">
    <div class="header" style="padding-bottom:4px;">
      <div class="back-row" style="margin-bottom:0;" onclick="navigateTo('home')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        返回首页
      </div>
      <div class="header-title" style="margin-top:8px;">
        <div class="logo">📊</div>
        考核历史
      </div>
    </div>
    <div id="historyContent"><!-- Filled by JS --></div>
  </div>
</div>

<!-- Confetti container -->
<div class="confetti-container" id="confettiContainer"></div>

<script>
// ========== State ==========
const state = {
  user: null,
  level: '',
  quiz: null,
  currentQuestion: 0,
  answers: [],
  users: [],
};

const API_BASE = '';

// ========== Demo Mode ==========
const DEMO_WORDS = [
  { word:'opportunity', meaning:'a chance to do something', cn:'机会', context:'This job is a great opportunity for young people to grow.', pos:'n.' },
  { word:'abandon', meaning:'to leave someone or something', cn:'放弃；遗弃', context:'They had to abandon the project due to lack of funds.', pos:'v.' },
  { word:'significant', meaning:'important or meaningful', cn:'重要的；有意义的', context:'There has been a significant increase in sales this year.', pos:'adj.' },
  { word:'benevolent', meaning:'well-meaning and kindly', cn:'仁慈的；乐善好施的', context:'The benevolent donor gave millions to charity.', pos:'adj.' },
  { word:'elaborate', meaning:'detailed and complicated', cn:'精心制作的；详尽的', context:'She gave an elaborate explanation of the entire process.', pos:'adj.' },
  { word:'inevitable', meaning:'certain to happen', cn:'不可避免的', context:'Change is inevitable in any growing organization.', pos:'adj.' },
  { word:'persistent', meaning:'continuing firmly despite difficulties', cn:'坚持不懈的', context:'Her persistent efforts finally paid off.', pos:'adj.' },
  { word:'ambiguous', meaning:'having more than one meaning', cn:'模糊的；模棱两可的', context:'The contract language was deliberately ambiguous.', pos:'adj.' },
  { word:'resilient', meaning:'able to recover quickly', cn:'有弹性的；适应力强的', context:'Children are remarkably resilient in the face of adversity.', pos:'adj.' },
  { word:'fluctuate', meaning:'to change frequently', cn:'波动；变化不定', context:'Stock prices fluctuate throughout the trading day.', pos:'v.' },
  { word:'accumulate', meaning:'to gather or collect', cn:'积累；积聚', context:'Dust tends to accumulate on neglected surfaces.', pos:'v.' },
  { word:'compelling', meaning:'very convincing or interesting', cn:'令人信服的；引人入胜的', context:'The detective found compelling evidence at the scene.', pos:'adj.' },
  { word:'deteriorate', meaning:'to become worse', cn:'恶化；退化', context:'His health began to deteriorate after the accident.', pos:'v.' },
  { word:'feasible', meaning:'possible and practical', cn:'可行的', context:'The engineer confirmed the plan was technically feasible.', pos:'adj.' },
  { word:'genuine', meaning:'real and sincere', cn:'真正的；真诚的', context:'She showed genuine concern for her colleagues.', pos:'adj.' },
];
let DEMO_MODE = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]] = [a[j],a[i]]; }
  return a;
}

function generateDemoQuiz() {
  DEMO_MODE = true;
  const selected = shuffle(DEMO_WORDS).slice(0, 6);
  // fill remaining with more words
  const remaining = shuffle(DEMO_WORDS.filter(w => !selected.includes(w)));
  const words = [...selected, ...remaining.slice(0, 4)];
  const types = [1,1,1,1,1,1,2,2,3,3];
  const shuffledTypes = shuffle(types);
  const questions = words.map((w, i) => {
    const type = shuffledTypes[i];
    const distractors = shuffle(DEMO_WORDS.filter(d => d.word !== w.word)).slice(0, 3).map(d => d.word);
    const opts = shuffle([w.word, ...distractors]);
    const correctIdx = opts.indexOf(w.word);
    const letters = ['A','B','C','D'];
    let context = '';
    if (type === 1) {
      const pattern = new RegExp('\\b' + w.word + '\\b', 'gi');
      context = w.context.replace(pattern, '_____');
    } else if (type === 2) {
      context = w.meaning;
    } else {
      context = w.cn;
    }
    return { type, word: w.word, context, options: opts.map((o, i) => `${letters[i]}. ${o}`), answer: letters[correctIdx], _correctIdx: correctIdx };
  });
  return { testId: 'DEMO-' + Date.now().toString(36), questions };
}

function generateDemoStats(user) {
  const total = DEMO_WORDS.length;
  const mastered = Math.floor(total * 0.4);
  const pending = total - mastered;
  const totalTests = 5;
  const correctCount = 32;
  const totalQuestions = 50;
  return {
    totalWords: total, masteredWords: mastered, pendingWords: pending,
    totalTests, totalQuestions, correctCount,
    accuracyRate: ((correctCount/totalQuestions)*100).toFixed(1) + '%',
    lastTestTime: Date.now() - 86400000
  };
}

function generateDemoHistory(user) {
  const history = [];
  const now = Date.now();
  for (let i = 0; i < 5; i++) {
    const total = 10;
    const correct = Math.floor(Math.random() * 5) + 4;
    const questions = shuffle(DEMO_WORDS).slice(0, total).map(w => ({
      word: w.word, question: w.cn, type: Math.random() > 0.5 ? 3 : 2,
      options: ['A','B','C','D'], yourAnswer: 'A', correctAnswer: 'A', isCorrect: true
    }));
    history.push({
      testId: 'hist-' + i, time: now - i * 86400000 * 2,
      questions: questions.map((q, j) => ({ ...q, isCorrect: j < correct })),
      correct, total
    });
  }
  return { history };
}

// ========== Helpers ==========
function $(id) { return document.getElementById(id); }

function showLoading(text) {
  $('loadingText').textContent = text || '加载中...';
  $('loadingOverlay').classList.add('active');
}
function hideLoading() { $('loadingOverlay').classList.remove('active'); }

function showToast(msg, type) {
  const t = $('toast');
  t.textContent = msg; t.className = 'toast ' + type + ' show';
  clearTimeout(t._timer); t._timer = setTimeout(() => t.classList.remove('show'), 2500);
}

function formatDate(ts) {
  if (!ts) return '暂无';
  const d = new Date(Number(ts));
  const pad = n => n.toString().padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function api(path, opts) {
  return fetch(API_BASE + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts
  }).then(r => r.json()).catch(e => { showToast('网络错误: ' + e.message, 'error'); throw e; });
}

function navigateTo(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  $('page' + page.charAt(0).toUpperCase() + page.slice(1)).classList.add('active');
  if (page === 'home') loadHome();
  if (page === 'history') loadHistory();
}

// ========== User ==========
function renderUsers(users) {
  const el = $('userList');
  if (!users.length) { el.innerHTML = '<div style="color:var(--text-secondary);font-size:14px;">暂无用户</div>'; return; }
  el.innerHTML = users.map(u => `
    <button class="user-btn${state.user === u ? ' active' : ''}" onclick="selectUser('${u}')">
      <span class="avatar">${u.charAt(0).toUpperCase()}</span>${u}
    </button>
  `).join('');
}

function selectUser(user) {
  state.user = user;
  renderUsers(state.users);
  loadStats(user);
}

// ========== Home ==========
async function loadHome() {
  showLoading('加载用户数据...');
  try {
    const data = await api('/api/admin/users');
    state.users = data.users || [];
    renderUsers(state.users);
    if (state.user && state.users.includes(state.user)) {
      renderUsers(state.users);
      await loadStats(state.user);
    } else if (state.users.length > 0) {
      selectUser(state.users[0]);
    } else {
      // 无用户时显示手动输入
      $('statsContent').innerHTML = '<div style="text-align:center;padding:20px 0;color:var(--text-secondary);font-size:15px;">💡 API未返回用户，请输入用户名预览</div>';
      $('userInputWrap').style.display = 'block';
    }
  } catch(e) { 
    $('statsContent').innerHTML = '<div style="text-align:center;padding:20px 0;color:var(--text-secondary);font-size:15px;">💡 后端连接异常，请输入用户名预览</div>';
    $('userInputWrap').style.display = 'block';
  }
  hideLoading();
}

// 清理测试数据确认
function showCleanupConfirm() {
  const user = state.user;
  if (!user) { showToast('请先选择用户', 'warn'); return; }
  if (!confirm(`确定要删除用户 "${user}" 的所有测试记录吗？\n\n⚠️ 此操作不可恢复！\n（测试数据是你在调试阶段产生的，删除后不影响词库和已掌握状态）`)) return;
  cleanupUserData(user);
}

async function cleanupUserData(user) {
  showLoading('正在清理测试数据...');
  try {
    const res = await api('/api/admin/cleanup', {
      method: 'POST',
      body: JSON.stringify({ user })
    });
    if (res.success) {
      showToast(`已删除 ${res.deleted} 条测试记录`, 'success');
      // 刷新统计
      loadStats(user);
    } else {
      showToast(res.error || '清理失败', 'error');
    }
  } catch(e) {
    showToast('清理失败: ' + e.message, 'error');
  }
  hideLoading();
}

function selectLevel(el, level) {
  state.level = level;
  document.querySelectorAll('.level-btn').forEach(b => {
    b.classList.remove('level-active');
  });
  el.classList.add('level-active');
}

function manualSelectUser() {
  const name = $('userInput').value.trim();
  if (!name) { showToast('请输入用户名', 'warn'); return; }
  state.users = [name];
  state.user = name;
  $('userInputWrap').style.display = 'none';
  $('userList').innerHTML = '';
  renderUsers([name]);
  loadStats(name);
}

async function loadStats(user) {
  if (!user) return;
  showLoading('加载统计...');
  try {
    const data = await api('/api/stats/' + encodeURIComponent(user));
    const { totalWords=0, masteredWords=0, pendingWords=0, totalTests=0, totalQuestions=0, correctCount=0, accuracyRate='0%', lastTestTime } = data;
    const pct = totalWords > 0 ? Math.round(masteredWords/totalWords*100) : 0;
    const dash = 282.7 * pct / 100;

    $('statsContent').innerHTML = `
      <div class="progress-ring-wrap">
        <div class="progress-ring">
          <svg width="100" height="100" viewBox="0 0 100 100">
            <circle class="bg" cx="50" cy="50" r="45"/>
            <circle class="fg" cx="50" cy="50" r="45" style="stroke-dasharray:282.7;stroke-dashoffset:${282.7-dash};"/>
          </svg>
          <div class="center">
            <div class="pct">${pct}%</div>
            <div class="pct-label">已掌握</div>
          </div>
        </div>
        <div class="ring-stats">
          <div class="ring-stat-item"><span><span class="dot" style="background:var(--orange);"></span>已掌握</span><strong>${masteredWords}</strong></div>
          <div class="ring-stat-item"><span><span class="dot" style="background:var(--text-muted);"></span>待复习</span><strong>${pendingWords}</strong></div>
          <div class="ring-stat-item"><span><span class="dot" style="background:var(--blue);"></span>总词汇</span><strong>${totalWords}</strong></div>
        </div>
      </div>
      <div class="stats-grid">
        <div class="stat-card orange">
          <div class="label"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>考核次数</div>
          <div class="value">${totalTests}</div>
        </div>
        <div class="stat-card green">
          <div class="label"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>正确率</div>
          <div class="value">${accuracyRate}</div>
          <div class="sub">${correctCount}/${totalQuestions}</div>
        </div>
      </div>
      ${lastTestTime ? `<div style="margin-top:12px;text-align:center;font-size:13px;color:var(--text-secondary);">🕐 上次考核：${formatDate(lastTestTime)}</div>` : ''}
      <div style="margin-top:14px;text-align:center;">
        <button class="btn btn-outline btn-small" onclick="showCleanupConfirm()" style="color:var(--red);border-color:var(--red);font-size:12px;">
          🗑 清理测试数据（${user}）
        </button>
      </div>
    `;
  } catch(e) {
    // Demo mode fallback
    const demo = generateDemoStats(selectedUser);
    renderStats(demo);
  }
  hideLoading();
}

// ========== Quiz ==========
async function startQuiz() {
  if (!state.user) { showToast('请先选择一个用户', 'error'); return; }
  showLoading('正在生成题目...');
  try {
    const data = await api('/api/quiz', {
      method: 'POST', body: JSON.stringify({ user: state.user, level: state.level || undefined })
    });
    if (data.error) { showToast(data.error, 'error'); hideLoading(); return; }
    state.quiz = data;
    state.currentQuestion = 0;
    state.answers = new Array(data.questions.length).fill(null);
    navigateTo('quiz');
    renderQuestion(0);
  } catch(e) {
    // Demo mode fallback
    const demo = generateDemoQuiz();
    state.quiz = demo;
    state.currentQuestion = 0;
    state.answers = new Array(demo.questions.length).fill(null);
    navigateTo('quiz');
    renderQuestion(0);
  }
  hideLoading();
}

function renderQuestion(idx) {
  const q = state.quiz.questions[idx];
  const total = state.quiz.questions.length;
  $('quizProgressFill').style.width = ((idx+1)/total*100) + '%';
  $('quizProgressText').textContent = idx + 1;
  $('quizTotalText').textContent = total;

  const types = {1:'语境填空', 2:'英英释义', 3:'中英释义'};
  const typeClasses = {1:'type1', 2:'type2', 3:'type3'};
  const typeIcons = {1:'📖', 2:'📝', 3:'🌏'};

  let questionDisplay = q.context || '';
  // For type 1, show the blank
  if (q.type === 1) {
    questionDisplay = q.context.replace(/_____/g, '<span class="blank">&nbsp;</span>');
  }

  const optsHtml = q.options.map((opt, i) => {
    const letter = String.fromCharCode(65 + i);
    const selected = state.answers[idx] === i ? 'selected' : '';
    return `<button class="option-btn ${selected}" onclick="selectOption(${idx}, ${i})">
      <span class="letter">${letter}</span>
      <span>${opt.replace(/^[A-D]\.\s*/, '')}</span>
    </button>`;
  }).join('');

  $('questionArea').innerHTML = `
    <div class="question-card">
      <div class="question-type-badge ${typeClasses[q.type]}">${typeIcons[q.type]} ${types[q.type]}</div>
      <div class="question-text">${questionDisplay}</div>
      <div class="options">${optsHtml}</div>
    </div>
  `;

  $('prevBtn').style.visibility = idx === 0 ? 'hidden' : 'visible';
  $('submitBtn').style.display = 'none';
  $('nextBtn').style.display = 'block';
  $('nextBtn').textContent = idx === total - 1 ? '完成作答' : '下一题';
  $('nextBtn').innerHTML = idx === total - 1 ?
    '完成作答 <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>' :
    '下一题 <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';

  // Check if all answered
  if (state.answers.every(a => a !== null)) {
    $('submitBtn').style.display = 'block';
  }
}

function selectOption(qIdx, optIdx) {
  state.answers[qIdx] = optIdx;
  renderQuestion(state.currentQuestion);
}

function prevQuestion() {
  if (state.currentQuestion > 0) {
    state.currentQuestion--;
    renderQuestion(state.currentQuestion);
  }
}

function nextQuestion() {
  if (state.currentQuestion < state.quiz.questions.length - 1) {
    state.currentQuestion++;
    renderQuestion(state.currentQuestion);
  } else {
    // Last question: check if all answered
    if (state.answers.every(a => a !== null)) {
      submitQuiz();
    } else {
      showToast('还有题目未作答', 'info');
    }
  }
}

async function submitQuiz() {
  if (!state.quiz) return;
  const unanswered = state.answers.indexOf(null);
  if (unanswered !== -1) {
    showToast(`还有第 ${unanswered+1} 题未作答`, 'info');
    state.currentQuestion = unanswered;
    renderQuestion(unanswered);
    return;
  }
  showLoading('正在提交...');
  try {
    const data = await api('/api/submit', {
      method: 'POST',
      body: JSON.stringify({ user: state.user, testId: state.quiz.testId, answers: state.answers })
    });
    if (data.error) { showToast(data.error, 'error'); hideLoading(); return; }
    state.quiz.result = data;
    navigateTo('results');
    renderResults(data);
  } catch(e) {
    // Demo mode: calculate locally
    const questions = state.quiz.questions || [];
    const letters = ['A','B','C','D'];
    let correct = 0;
    const results = questions.map((q, i) => {
      const yourIdx = state.answers[i];
      const yourLetter = yourIdx !== null && yourIdx !== undefined ? letters[yourIdx] : null;
      const isCorrect = yourLetter === q.answer;
      if (isCorrect) correct++;
      return { q: i+1, word: q.word, your: yourLetter, answer: q.answer, correct: isCorrect };
    });
    const total = results.length;
    const accuracy = `${((correct/total)*100).toFixed(1)}%`;
    const demoResult = { results, correct, total, accuracy, masteredWords: [], stats: { total: 42, mastered: 18, pending: 24 } };
    state.quiz.result = demoResult;
    navigateTo('results');
    renderResults(demoResult);
  }
  hideLoading();
}

// ========== Results ==========
const ENCOURAGE = {
  perfect: ['满分！你就是单词大师！🏆', '全部答对，太厉害了！👑', '完美通关，学霸本霸！⭐'],
  great: ['表现很棒，继续加油！💪', '掌握得不错，再接再厉！🔥', '优秀！离满分不远了！✨'],
  good: ['还不错，继续努力！📚', '及格了，下次会更好！💪', '稳住，再复习一下就能全对！'],
  poor: ['还需要多复习哦！📖', '别灰心，多练几次就好了！💪', '加油！每一次都是进步！🌟'],
};
function getEncourage(correct, total) {
  const r = correct / total;
  if (r >= 1) return ENCOURAGE.perfect[Math.floor(Math.random() * ENCOURAGE.perfect.length)];
  if (r >= 0.8) return ENCOURAGE.great[Math.floor(Math.random() * ENCOURAGE.great.length)];
  if (r >= 0.6) return ENCOURAGE.good[Math.floor(Math.random() * ENCOURAGE.good.length)];
  return ENCOURAGE.poor[Math.floor(Math.random() * ENCOURAGE.poor.length)];
}

let _showAnalysis = false;

function renderResults(data) {
  const { correct, total, accuracy, masteredWords } = data;
  const pass = correct / total >= 0.6;
  const pct = Math.round(correct/total*100);
  const encourage = getEncourage(correct, total);
  _showAnalysis = false;

  let detailsHtml = '';
  if (data.results) {
    data.results.forEach((r, i) => {
      const q = state.quiz?.questions[i];
      const typeNames = {1:'语境填空', 2:'英英释义', 3:'中英释义'};

      // 构建完整题干展示
      let contextDisplay = '';
      let explanationHtml = '';

      if (q?.type === 1 && q?.context) {
        // Type 1: 显示上下文（空白处用 ___ 占位）
        contextDisplay = q.context.replace(/_____/g, '<span class="inline-blank">&nbsp;</span>');

        // 构建解析
        const optLetters = ['A','B','C','D'];
        const optWords = q.options.map(o => o.replace(/^[A-D]\.\s*/, ''));
        const correctLetter = q.answer;
        const correctWord = optWords[optLetters.indexOf(correctLetter)];

        // 检查 a(n) 标注
        const hasArticle = q.context.includes('a(n)');

        explanationHtml = `
          <div class="detail-line" style="margin-top:8px;">
            <strong>正确选项：</strong>${correctLetter}. "${correctWord}"
          </div>
          <div class="detail-line" style="margin-top:4px;">`;
        if (hasArticle) {
          explanationHtml += `题干中 "a(n)" 表示冠词根据单词首音自适应——元音开头用 "an"，辅音开头用 "a"。正确答案 "${correctWord}" 代入后语法通顺且符合语境。`;
        } else {
          explanationHtml += `将正确单词 "${correctWord}" 填入空白处，整句话语义通顺、语法正确。其他选项放入后语义不通或不符合固定搭配。`;
        }
        explanationHtml += `</div>`;

      } else if (q?.type === 2 && q?.context) {
        contextDisplay = `📖 ${q.context}`;
        const correctWord = q.options.find(o => o.startsWith(q.answer + '.'))?.replace(/^[A-D]\.\s*/, '') || '';
        explanationHtml = `
          <div class="detail-line" style="margin-top:8px;">
            <strong>正确选项：</strong>${q.answer}. "${correctWord}"
          </div>
          <div class="detail-line" style="margin-top:4px;">
            该英文释义匹配的正是单词 "${correctWord}"。其他选项的语义与此释义不符。
          </div>`;
      } else if (q?.type === 3 && q?.context) {
        contextDisplay = `🌏 ${q.context}`;
        const correctWord = q.options.find(o => o.startsWith(q.answer + '.'))?.replace(/^[A-D]\.\s*/, '') || '';
        explanationHtml = `
          <div class="detail-line" style="margin-top:8px;">
            <strong>正确选项：</strong>${q.answer}. "${correctWord}"
          </div>
          <div class="detail-line" style="margin-top:4px;">
            中文 "${q.context}" 对应的英文单词是 "${correctWord}"。
          </div>`;
      }

      // 构建选项列表
      let optionsHtml = '';
      if (q?.options && q.options.length > 0) {
        optionsHtml = q.options.map(opt => {
          const letter = opt[0];
          const isCorrect = letter === q.answer;
          const isUserChoice = letter === r.your;
          let cls = 'opt-item';
          if (isCorrect) cls += ' opt-correct';
          if (isUserChoice && !r.correct) cls += ' opt-wrong';
          let tag = '';
          if (isCorrect && isUserChoice) tag = '<span class="opt-tag tag-correct">✔ 正确答案</span>';
          else if (isCorrect) tag = '<span class="opt-tag tag-correct">✔ 正确答案</span>';
          else if (isUserChoice) tag = '<span class="opt-tag tag-wrong">✘ 你的选择</span>';
          return `<div class="${cls}">${opt} ${tag}</div>`;
        }).join('');
      } else {
        optionsHtml = `<div style="color:#999;font-size:13px;padding:8px 0;">选项未保存（历史记录）</div>`;
      }

      detailsHtml += `
        <div class="result-analysis-card ${r.correct ? 'correct' : 'wrong'}">
          <div class="row">
            <span class="word">${r.word}</span>
            <span class="status-badge ${r.correct ? 'correct' : 'wrong'}">${r.correct ? '✓ 正确' : '✗ 错误'}</span>
          </div>
          <div class="row" style="font-size:13px;color:var(--text-secondary);margin-top:4px;">
            <span>${typeNames[q?.type] || ''} · 第 ${i+1} 题</span>
          </div>

          <div class="ctx-box">
            <div class="ctx-label">📝 题干：</div>
            <div class="ctx-text">${contextDisplay}</div>
          </div>

          <div class="opts-box">
            <div class="opts-label">选项：</div>
            ${optionsHtml}
          </div>

          <div class="explain-box">
            <div class="explain-label">解析：</div>
            ${explanationHtml}
          </div>
        </div>
      `;
    });
  }

  $('resultContent').innerHTML = `
    <div class="result-hero">
      <div class="big-score ${pass ? 'pass' : 'fail'}"><strong>${correct}</strong><span style="font-size:28px;color:var(--text-secondary);font-weight:400;">/${total}</span></div>
      <div style="font-size:16px;color:var(--text-secondary);margin-top:4px;">正确率 ${accuracy}</div>
      <div style="font-size:18px;font-weight:600;margin-top:12px;color:${pass ? 'var(--orange)' : 'var(--text-secondary)'};">${encourage}</div>
      ${masteredWords && masteredWords.length ? `<div class="mastered-tag" style="background:#E8F5E9;color:var(--green);margin-top:8px;">✅ 新掌握 ${masteredWords.length} 个单词</div>` : ''}
    </div>

    <div id="analysisArea" style="display:none;margin-bottom:20px;">
      <div class="section-title">📋 逐题回顾</div>
      ${detailsHtml}
    </div>

    <div class="actions" style="margin-top:20px;">
      <button class="btn btn-primary" onclick="navigateTo('home')">返回首页</button>
      <button class="btn btn-secondary" onclick="navigateTo('history')">查看历史</button>
    </div>

    <div style="text-align:right;margin-top:16px;">
      <button class="btn btn-outline btn-small" id="analysisBtn" onclick="toggleAnalysis()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        答案分析
      </button>
    </div>
  `;

  // Confetti if passed
  if (pass) {
    launchConfetti();
  }
}

function toggleAnalysis() {
  _showAnalysis = !_showAnalysis;
  const area = $('analysisArea');
  const btn = $('analysisBtn');
  area.style.display = _showAnalysis ? 'block' : 'none';
  if (btn) {
    btn.innerHTML = _showAnalysis
      ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg> 收起分析'
      : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg> 答案分析';
  }
}

function launchConfetti() {
  const container = $('confettiContainer');
  container.innerHTML = '';
  const colors = ['#FF6B00','#FF8C38','#FFB347','#34C759','#007AFF','#AF52DE','#FF3B30'];
  for (let i = 0; i < 40; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.left = Math.random() * 100 + '%';
    el.style.top = Math.random() * 50 + 30 + '%';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.width = (6 + Math.random() * 8) + 'px';
    el.style.height = (6 + Math.random() * 8) + 'px';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    el.style.animationDelay = (Math.random() * 0.8) + 's';
    el.style.animationDuration = (1 + Math.random() * 0.5) + 's';
    container.appendChild(el);
  }
  setTimeout(() => container.innerHTML = '', 2500);
}

// ========== History ==========
async function loadHistory() {
  if (!state.user) { showToast('请先选择用户', 'error'); return; }
  showLoading('加载历史记录...');
  try {
    const data = await api('/api/history/' + encodeURIComponent(state.user));
    const list = data.history || [];
    $('historyContent').innerHTML = list.length
      ? '<div class="history-list">' + list.map(h => {
          const pass = h.correct / h.total >= 0.6;
          const pct = h.total > 0 ? Math.round(h.correct/h.total*100) : 0;
          return `<div class="history-item" onclick="alert('测试: ${h.testId}\\n日期: ${formatDate(h.time)}\\n得分: ${h.correct}/${h.total} (${pct}%)')">
            <div class="top">
              <span class="date">${formatDate(h.time)}</span>
              <span class="score ${pass ? 'pass' : 'fail'}">${h.correct}/${h.total}</span>
            </div>
            <div class="bottom">
              <div class="bar"><div class="fill ${pass ? 'pass' : 'fail'}" style="width:${pct}%"></div></div>
              <span class="accuracy">${pct}%</span>
            </div>
          </div>`;
        }).join('') + '</div>'
      : `<div class="history-empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <p>还没有考核记录<br>开始一次考核吧！</p>
         </div>`;
  } catch(e) {
    // Demo mode: show mock history
    const demoHistory = getDemoHistory();
    $('historyContent').innerHTML = '<div class="history-list">' + demoHistory.map(h => {
      const pass = h.correct / h.total >= 0.6;
      const pct = h.total > 0 ? Math.round(h.correct/h.total*100) : 0;
      return `<div class="history-item" onclick="alert('测试: ${h.testId}\\n日期: ${formatDate(h.time)}\\n得分: ${h.correct}/${h.total} (${pct}%)')">
        <div class="top">
          <span class="date">${formatDate(h.time)}</span>
          <span class="score ${pass ? 'pass' : 'fail'}">${h.correct}/${h.total}</span>
        </div>
        <div class="bottom">
          <div class="bar"><div class="fill ${pass ? 'pass' : 'fail'}" style="width:${pct}%"></div></div>
          <span class="accuracy">${pct}%</span>
        </div>
      </div>`;
    }).join('') + '</div>';
  }
  hideLoading();
}

// ========== Init ==========
loadHome();
</script>
</body>
</html>
