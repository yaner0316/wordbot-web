<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>单词机器人 - WordBot</title>
  <link rel="preconnect" href="https://fonts.googleapis.cn" />
  <link rel="preconnect" href="https://fonts.gstatic.cn" crossorigin />
  <link href="https://fonts.googleapis.cn/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>

<div id="app">
  <!-- Loading -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner">
      <div class="ring"></div>
      <div class="text" id="loadingText">加载中...</div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- ===== PAGE: HOME ===== -->
  <div class="page active" id="pageHome">
    <div class="header">
      <div class="header-title">
        <div class="logo">📖</div>
        单词机器人
      </div>
      <div class="header-actions">
        <button class="header-btn" onclick="navigateTo('history')" title="历史记录">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </button>
      </div>
    </div>

    <div class="user-selector" id="userList"></div>
    <div class="user-input-wrap" id="userInputWrap" style="display:none;margin-top:12px;text-align:center;">
      <input type="text" id="userInput" placeholder="输入用户名开始" 
        style="border:2px solid var(--orange);border-radius:25px;padding:10px 20px;font-size:16px;width:200px;text-align:center;outline:none;color:var(--text);"
        onkeydown="if(event.key==='Enter')manualSelectUser()">
      <button onclick="manualSelectUser()" style="margin-top:8px;background:var(--orange);color:white;border:none;border-radius:20px;padding:8px 24px;font-size:14px;cursor:pointer;">确定</button>
    </div>

    <div class="level-selector" style="margin:16px auto;text-align:center;max-width:340px;">
      <div style="font-size:13px;color:var(--text-secondary);margin-bottom:8px;">题干语言难度（按用户记忆）</div>
      <div class="difficulty-options">
        <button class="level-btn" data-level="小学" onclick="selectLevel(this,'小学')">
          小学
        </button>
        <button class="level-btn level-active" data-level="中学" onclick="selectLevel(this,'中学')">
          中学
        </button>
        <button class="level-btn" data-level="高中" onclick="selectLevel(this,'高中')">
          高中
        </button>
        <button class="level-btn" data-level="CET4_6_TOEFL" onclick="selectLevel(this,'CET4_6_TOEFL')">
          CET/TOEFL
        </button>
      </div>
    </div>

    <div style="margin:10px auto 18px;text-align:center;max-width:340px;">
      <div style="font-size:13px;color:var(--text-secondary);margin-bottom:8px;">数据模式</div>
      <div style="display:flex;gap:8px;">
        <button class="level-btn level-active mode-btn" data-mode="real" onclick="selectMode(this,'real')" style="flex:1;">正式学习</button>
        <button class="level-btn mode-btn" data-mode="test" onclick="selectMode(this,'test')" style="flex:1;">测试模式</button>
      </div>
      <div id="modeHint" style="font-size:12px;color:var(--text-secondary);margin-top:7px;">正式学习会更新掌握状态和统计</div>
    </div>

    <div id="statsContent">
      <!-- Filled by JS -->
    </div>

    <div class="actions">
      <button class="btn btn-primary" onclick="startQuiz()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        开始考核
      </button>
    </div>

    <div id="recentStatus" style="margin-top:12px;text-align:center;font-size:13px;color:var(--text-secondary);display:none;">
      上次考核：<span id="lastTestTime"></span>
    </div>
  </div>

  <!-- ===== PAGE: QUIZ ===== -->
  <div class="page" id="pageQuiz">
    <div class="header" style="padding-bottom:4px;">
      <div class="header-title">
        <div class="logo">📝</div>
        单词考核
      </div>
    </div>

    <div class="quiz-progress">
      <div class="bar-wrap"><div class="bar-fill" id="quizProgressFill" style="width:10%"></div></div>
      <div class="count"><span id="quizProgressText">1</span>/<span id="quizTotalText">10</span></div>
    </div>

    <div id="questionArea">
      <!-- Filled by JS -->
    </div>

    <div class="quiz-nav">
      <button class="btn btn-secondary" id="prevBtn" onclick="prevQuestion()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        上一题
      </button>
      <button class="btn btn-secondary" id="nextBtn" onclick="nextQuestion()">
        下一题
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <button class="btn btn-success" id="submitBtn" onclick="submitQuiz()" style="display:none;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        提交答案
      </button>
    </div>
  </div>

  <!-- ===== PAGE: RESULTS ===== -->
  <div class="page" id="pageResults">
    <div class="back-row" onclick="navigateTo('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      返回首页
    </div>
    <div id="resultContent"><!-- Filled by JS --></div>
  </div>

  <!-- ===== PAGE: HISTORY ===== -->
  <div class="page" id="pageHistory">
    <div class="header" style="padding-bottom:4px;">
      <div class="back-row" style="margin-bottom:0;" onclick="navigateTo('home')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        返回首页
      </div>
      <div class="header-title" style="margin-top:8px;">
        <div class="logo">📊</div>
        考核历史
      </div>
    </div>
    <div style="display:flex;gap:8px;margin:0 0 16px;">
      <button class="level-btn level-active history-mode-btn" data-mode="real" onclick="selectHistoryMode(this,'real')" style="flex:1;">正式记录</button>
      <button class="level-btn history-mode-btn" data-mode="test" onclick="selectHistoryMode(this,'test')" style="flex:1;">测试记录</button>
    </div>
    <div id="historyContent"><!-- Filled by JS --></div>
  </div>
</div>

<!-- Confetti container -->
<div class="confetti-container" id="confettiContainer"></div>

<script src="src/quiz-logic.js"></script>
<script src="src/review-flow.js"></script>
<script src="config.js"></script>
<script src="src/app.js"></script>
</body>
</html>
